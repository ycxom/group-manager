services:
  paddle-ocr:
    build:
      context: .
      dockerfile: Dockerfile.gpu   # GPU 优先；无 N 卡时改回 Dockerfile（CPU）
    container_name: paddle-ocr
    ports:
      - "8866:8866"
    restart: unless-stopped
    environment:
      - OCR_LANG=ch        # ch=简体中文，japan=日文，en=英文，多语言用 ch 即可
      - USE_GPU=1          # GPU 版=1；CPU 版改为 0
      - OCR_MIN_CONF=0.6   # 置信度阈值（0~1），调高可减少乱码，调低可识别模糊字
      - OCR_MIN_LEN=1      # 最短行字符数，过滤纯噪声
    # GPU 资源预留（需宿主机安装 nvidia-container-toolkit）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8866/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
