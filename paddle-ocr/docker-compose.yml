services:
  paddle-ocr:
    build:
      context: .
      dockerfile: Dockerfile       # CPU 默认；GPU 改为 Dockerfile.gpu
    container_name: paddle-ocr
    ports:
      - "8866:8866"
    volumes:
      - paddle_models:/root/.paddleocr   # 模型缓存持久化，避免每次重启重新下载
    restart: unless-stopped
    environment:
      - OCR_LANG=ch      # ch=简体中文，japan=日文，en=英文，多语言用 ch 即可
      - USE_GPU=0        # GPU 版改为 1
    # GPU 版取消注释：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8866/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # 首次启动下载模型需要较长时间

volumes:
  paddle_models:
