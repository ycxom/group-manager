<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>群管控制台</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--r:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font:13px/1.5 'Segoe UI',system-ui,sans-serif}

/* Login */
#login{display:flex;align-items:center;justify-content:center;height:100%;background:var(--bg)}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:36px 32px;width:340px;display:flex;flex-direction:column;gap:14px}
.lbox h1{font-size:20px;text-align:center;letter-spacing:.5px}
.lbox p{color:var(--dim);font-size:12px;text-align:center;margin-top:-6px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.lbox .warn{background:#2d1a00;border:1px solid var(--yellow);border-radius:var(--r);padding:8px 12px;color:var(--yellow);font-size:12px;display:none}
#lerr{color:var(--red);font-size:12px;text-align:center;min-height:16px}

/* App */
#app{display:none;height:100%;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:15px;font-weight:600}
.hright{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.dot.ok{background:var(--green)}
.body{display:flex;flex:1;overflow:hidden}
nav{width:160px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:8px 0;overflow-y:auto}
nav button{display:block;width:100%;text-align:left;padding:8px 16px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;border-left:3px solid transparent}
nav button:hover{color:var(--text);background:var(--bg3)}
nav button.active{border-left-color:var(--blue);color:var(--blue);background:var(--bg3)}
nav hr{border:none;border-top:1px solid var(--border);margin:6px 8px}
main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

/* Event log */
#log{flex-shrink:0;height:120px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column}
#log header{padding:4px 12px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#logbody{flex:1;overflow-y:auto;padding:4px 12px;font-family:monospace;font-size:11px}
.recall{color:var(--yellow)}.kick{color:var(--red)}

/* Forms */
input,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--r);font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--blue)}
input[type=number]{width:90px}
button{padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;font-size:12px;background:var(--bg3);color:var(--text)}
button:hover{border-color:var(--blue);color:var(--blue)}
button.primary{background:var(--blue);color:#000;border-color:var(--blue);font-weight:600}
button.primary:hover{background:#79b8ff}
button.danger{color:var(--red);border-color:transparent}
button.danger:hover{border-color:var(--red)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px}
.card h2{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 10px;font-weight:500;color:var(--dim);border-bottom:1px solid var(--border)}
td{padding:6px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border)}
.badge.root,.badge.superadmin{color:var(--red);border-color:var(--red)}
.badge.admin{color:var(--blue);border-color:var(--blue)}
.badge.global{color:var(--green);border-color:var(--green)}
.on{color:var(--green)}.off{color:var(--red)}
.empty{color:var(--dim);text-align:center;padding:24px;font-size:12px}
.sbar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.sbar label{color:var(--dim);font-size:12px}

/* Toast */
#toast{position:fixed;bottom:132px;right:16px;background:var(--bg3);border:1px solid var(--border);padding:8px 16px;border-radius:var(--r);font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
#toast.show{opacity:1}

/* Password modal */
.modal-bg{position:fixed;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:320px;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:15px}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="lbox">
    <h1>群管控制台</h1>
    <p>Group Manager — 请使用账户登录</p>
    <div class="warn" id="defwarn" style="display:none">⚠ 正在使用默认密码，请立即在「系统用户」页修改！</div>
    <div class="field"><label>用户名</label><input id="lu" type="text" autocomplete="username" placeholder="admin"></div>
    <div class="field"><label>密码</label><input id="lp" type="password" autocomplete="current-password" placeholder="••••••"></div>
    <label class="row" style="font-size:12px"><input type="checkbox" id="remem" style="width:auto"> 记住用户名</label>
    <button class="primary" id="lbtn">登录</button>
    <div id="lerr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>群管控制台</h1>
    <div class="hright">
      <span class="dot" id="dot"></span>
      <span id="stxt">未连接</span>
      <span id="uname" style="color:var(--text)"></span>
      <button id="pwbtn" style="font-size:11px">改密码</button>
      <button id="lout" style="font-size:11px">退出</button>
    </div>
  </header>
  <div id="appwarn" style="display:none;background:#2d1a00;border-bottom:1px solid var(--yellow);padding:7px 16px;color:var(--yellow);font-size:12px;flex-shrink:0">⚠ 正在使用默认密码，请前往「系统用户」页立即修改！</div>
  <div class="body">
    <nav>
      <button data-p="dashboard" class="active">仪表板</button>
      <button data-p="groups">群组</button>
      <hr>
      <button data-p="keywords">关键词</button>
      <button data-p="exempt">豁免用户</button>
      <hr>
      <button data-p="violations">违规记录</button>
      <hr>
      <button data-p="categories">组别</button>
      <button data-p="imageconfig">图片处理</button>
      <button data-p="users">系统用户</button>
    </nav>
    <main id="main"></main>
  </div>
  <div id="log">
    <header>实时事件<button class="danger" id="clrlog" style="padding:0 6px;font-size:11px">清空</button></header>
    <div id="logbody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────
let me = null        // { username, role }
let groups = []      // QQ groups visible to current user
let categories = []  // categories visible to current user
let es = null        // EventSource

async function refreshMeta() {
  const [gl, cl] = await Promise.all([api('/api/group/list'), api('/api/category/list')])
  groups = gl?.groups || []
  categories = cl?.categories || []
}

// ── API (POST fetch) ─────────────────────────────────────────────────────
async function api(path, body = {}) {
  try {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body)
    })
    const data = await r.json()
    if (!data.ok) { showErr(data.error || '请求失败'); return null }
    return data.data
  } catch(e) { showErr(e.message); return null }
}

// ── Toast ────────────────────────────────────────────────────────────────
let toastT
function showOk(m)  { flash(m, false) }
function showErr(m) { flash(m, true) }
function flash(m, err) {
  const el = document.getElementById('toast')
  el.textContent = m; el.style.color = err ? 'var(--red)' : 'var(--green)'
  el.classList.add('show'); clearTimeout(toastT)
  toastT = setTimeout(() => el.classList.remove('show'), 2500)
}

// ── SSE ──────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) { es.close(); es = null }
  es = new EventSource('/events', { withCredentials: true })
  es.onopen = () => { setConn(true); addLog({ type: 'info', text: 'SSE 已连接，等待实时事件...' }) }
  es.onerror = () => { setConn(false); addLog({ type: 'info', text: '连接断开，4 秒后重连...' }); setTimeout(connectSSE, 4000) }
  es.onmessage = (e) => {
    const ev = JSON.parse(e.data)
    if (ev.type === 'connected') return
    addLog(ev)
  }
}

function setConn(ok) {
  document.getElementById('dot').className = 'dot' + (ok ? ' ok' : '')
  document.getElementById('stxt').textContent = ok ? '已连接' : '断线重连...'
}

function setDefaultWarn(isDefault) {
  document.getElementById('appwarn').style.display = isDefault ? 'block' : 'none'
}

// ── Event log ─────────────────────────────────────────────────────────────
function addLog(ev) {
  const lb = document.getElementById('logbody')
  const t = new Date().toTimeString().slice(0,8)
  const el = document.createElement('div')
  if (ev.type === 'recall') {
    el.className = 'recall'
    el.textContent = `[${t}] 撤回 群${ev.groupId} 用户${ev.userId} (第${ev.violations}次) — ${ev.content}`
  } else if (ev.type === 'kick') {
    el.className = 'kick'
    el.textContent = `[${t}] 踢出 用户${ev.userId} 累计${ev.violations}次`
  } else if (ev.type === 'scan') {
    el.style.color = 'var(--dim)'
    el.textContent = `[${t}] 群${ev.groupId} 用户${ev.userId} 扫描通过`
  } else if (ev.type === 'info') {
    el.style.color = 'var(--dim)'
    el.textContent = `[${t}] ${ev.text}`
  } else return
  lb.appendChild(el); lb.scrollTop = lb.scrollHeight
}

// ── DOM helpers ───────────────────────────────────────────────────────────
function h(tag, attr = {}, ...ch) {
  const el = document.createElement(tag)
  for (const [k, v] of Object.entries(attr)) {
    if (k === 'cls') el.className = v
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v)
    else el.setAttribute(k, v)
  }
  for (const c of ch) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
  return el
}
function dt(s) { return s ? s.slice(0,16).replace('T',' ') : '—' }

function groupSel(cur, onChange) {
  const s = h('select', { onchange: onChange })
  if (me?.role === 'superadmin') {
    const o = h('option', { value: '0' }, '全局 (group_id=0)')
    if (cur === 0) o.selected = true
    s.appendChild(o)
  }
  for (const g of groups) {
    const o = h('option', { value: String(g.group_id) }, `群 ${g.group_id}`)
    if (g.group_id === cur) o.selected = true
    s.appendChild(o)
  }
  return s
}

// kwScope: { type:'global'|'group'|'category', id:number }
// Returns a <select> for keyword scope selection
function kwScopeSel(cur, onChange) {
  const s = h('select', { onchange: (e) => onChange(JSON.parse(e.target.value)) })
  if (me?.role === 'superadmin') {
    const v = JSON.stringify({ type: 'global', id: 0 })
    const o = h('option', { value: v }, '全局 (group_id=0)')
    if (cur.type === 'global') o.selected = true
    s.appendChild(o)
  }
  if (categories.length) {
    const grp = document.createElement('optgroup'); grp.label = '── 组别 ──'
    for (const c of categories) {
      const v = JSON.stringify({ type: 'category', id: c.id })
      const o = h('option', { value: v }, `组别: ${c.name}`)
      if (cur.type === 'category' && cur.id === c.id) o.selected = true
      grp.appendChild(o)
    }
    s.appendChild(grp)
  }
  if (groups.length) {
    const grp = document.createElement('optgroup'); grp.label = '── 群组 ──'
    for (const g of groups) {
      const v = JSON.stringify({ type: 'group', id: g.group_id })
      const o = h('option', { value: v }, `群 ${g.group_id}`)
      if (cur.type === 'group' && cur.id === g.group_id) o.selected = true
      grp.appendChild(o)
    }
    s.appendChild(grp)
  }
  return s
}

// ── Pages ─────────────────────────────────────────────────────────────────

async function renderDashboard() {
  const isSA = me?.role === 'superadmin'
  const reqs = [api('/api/group/list'), api('/api/violation/list'), api('/api/category/list')]
  if (isSA) reqs.push(api('/api/keyword/list', { groupId: 0 }))
  const [gl, vl, cl, kl] = await Promise.all(reqs)
  groups = (gl?.groups || [])
  categories = (cl?.categories || [])
  const M = document.getElementById('main'); M.innerHTML = ''

  const stats = h('div', { cls: 'row' })
  const statItems = [['监控群组', groups.length, '--blue'], ['组别', categories.length, '--green'], ['违规用户', (vl?.violations||[]).length, '--red']]
  if (isSA) statItems.splice(2, 0, ['全局关键词', (kl?.keywords||[]).length, '--yellow'])
  statItems.forEach(([label, n, c]) => {
    const card = h('div', { cls: 'card', style: `flex:1;min-width:100px;text-align:center;border-top:2px solid var(${c})` })
    card.innerHTML = `<div style="font-size:28px;font-weight:700;color:var(${c})">${n}</div><div style="color:var(--dim);font-size:12px;margin-top:2px">${label}</div>`
    stats.appendChild(card)
  })
  M.appendChild(stats)

  if (groups.length) {
    const card = h('div', { cls: 'card' }); card.appendChild(h('h2',{},'监控群组'))
    const t = h('table')
    t.innerHTML = '<thead><tr><th>群号</th><th>状态</th><th>违规上限</th><th>关键词</th><th>违规人数</th></tr></thead>'
    const tb = h('tbody')
    groups.forEach(g => {
      const tr = h('tr')
      tr.innerHTML = `<td>${g.group_id}</td><td class="${g.enabled?'on':'off'}">${g.enabled?'启用':'停用'}</td><td>${g.max_violations}</td><td>${g.keyword_count}</td><td>${g.violation_count}</td>`
      tb.appendChild(tr)
    })
    t.appendChild(tb); card.appendChild(t); M.appendChild(card)
  }
}

async function renderGroups() {
  const gl = await api('/api/group/list'); if (!gl) return
  groups = gl.groups || []
  const M = document.getElementById('main'); M.innerHTML = ''

  // Add form (superadmin only)
  if (me?.role === 'superadmin') {
    const ac = h('div', { cls: 'card' }); ac.appendChild(h('h2',{},'添加群组'))
    const gi = h('input',{type:'number',placeholder:'群号',style:'width:140px'})
    const mi = h('input',{type:'number',placeholder:'违规上限',value:'3'})
    const ab = h('button',{cls:'primary',onclick:async()=>{
      if (!gi.value) return showErr('请输入群号')
      const r = await api('/api/group/add',{groupId:+gi.value,maxViolations:+mi.value||3})
      if(r!==null){showOk(`已添加群 ${gi.value}`);gi.value='';renderGroups()}
    }},'添加')
    ac.appendChild(h('div',{cls:'row'},gi,h('label',{style:'color:var(--dim);font-size:12px'},'违规上限'),mi,ab))
    M.appendChild(ac)
  }

  const card = h('div',{cls:'card'}); card.appendChild(h('h2',{},`群组列表 (${groups.length})`))
  if (!groups.length) { card.appendChild(h('div',{cls:'empty'},'暂无群组')); M.appendChild(card); return }

  const t = h('table')
  const isSA2 = me?.role === 'superadmin'
  t.innerHTML=`<thead><tr><th>群号</th><th>状态</th><th>违规上限</th><th>所属组别</th><th>关键词</th><th>违规</th>${isSA2?'<th>操作</th>':''}</tr></thead>`
  const tb = h('tbody')
  groups.forEach(g => {
    const tr = h('tr')
    const es2 = h('select',{onchange:async(e)=>{await api('/api/group/settings',{groupId:g.group_id,enabled:+e.target.value})}})
    es2.innerHTML='<option value="1">启用</option><option value="0">停用</option>'; es2.value=String(g.enabled)
    const mi2 = h('input',{type:'number',value:String(g.max_violations),style:'width:60px'})
    const sb  = h('button',{onclick:async()=>{await api('/api/group/settings',{groupId:g.group_id,maxViolations:+mi2.value});showOk('已保存')}},'保存')
    const tdE=h('td');tdE.appendChild(es2)
    const tdM=h('td');tdM.append(mi2,' ',sb)
    const tdC=h('td',{style:'max-width:180px'})
    ;(g.categories||[]).forEach(c=>tdC.appendChild(h('span',{cls:'badge global',style:'font-size:11px;margin:1px'},c.name)))
    if(!(g.categories||[]).length) tdC.appendChild(h('span',{style:'color:var(--dim);font-size:11px'},'—'))
    tr.appendChild(h('td',{},String(g.group_id))); tr.appendChild(tdE); tr.appendChild(tdM); tr.appendChild(tdC)
    tr.appendChild(h('td',{},String(g.keyword_count)))
    tr.appendChild(h('td',{},String(g.violation_count)))
    if(isSA2){
      const rb=h('button',{cls:'danger',onclick:async()=>{
        if(!confirm(`确认移除群 ${g.group_id}？`))return
        await api('/api/group/remove',{groupId:g.group_id}); showOk(`已移除群 ${g.group_id}`); renderGroups()
      }},'移除')
      const tdA=h('td');tdA.appendChild(rb); tr.appendChild(tdA)
    }
    tb.appendChild(tr)
  })
  t.appendChild(tb); card.appendChild(t); M.appendChild(card)
}

// kwScope: { type:'global'|'group'|'category', id:number }
let kwScope = { type: 'global', id: 0 }

async function renderKeywords() {
  // Init default scope for non-superadmin
  if (me?.role !== 'superadmin' && kwScope.type === 'global') {
    if (categories.length) kwScope = { type: 'category', id: categories[0].id }
    else if (groups.length) kwScope = { type: 'group', id: groups[0].group_id }
    else kwScope = { type: 'none' }
  }
  if (kwScope.type === 'none') {
    const M = document.getElementById('main'); M.innerHTML=''
    M.appendChild(h('div',{cls:'card',innerHTML:'<div class="empty">暂无已授权群组或组别，请联系超级管理员分配权限</div>'}))
    return
  }

  // Fetch keywords for current scope
  let data
  if (kwScope.type === 'category') {
    data = await api('/api/category/keyword/list', { categoryId: kwScope.id })
  } else {
    data = await api('/api/keyword/list', { groupId: kwScope.type === 'global' ? 0 : kwScope.id })
  }
  if (!data) return

  const M = document.getElementById('main'); M.innerHTML=''
  const card = h('div',{cls:'card'}); card.appendChild(h('h2',{},'关键词管理'))

  const sb = h('div',{cls:'sbar'}); sb.appendChild(h('label',{},'作用域：'))
  sb.appendChild(kwScopeSel(kwScope, (scope) => { kwScope = scope; renderKeywords() }))
  card.appendChild(sb)

  const ki=h('input',{type:'text',placeholder:'关键词',style:'flex:1;min-width:160px'})
  const scopeLabel = kwScope.type==='global'?' (全局)' : kwScope.type==='category'?` (组别)`:''
  const kb=h('button',{cls:'primary',onclick:async()=>{
    const kw=ki.value.trim(); if(!kw)return showErr('请输入关键词')
    let r
    if (kwScope.type === 'category') {
      r = await api('/api/category/keyword/add', { categoryId: kwScope.id, keyword: kw })
    } else {
      r = await api('/api/keyword/add', { groupId: kwScope.type==='global'?0:kwScope.id, keyword: kw })
    }
    if(r!==null){showOk(`已添加: ${kw}`);ki.value='';renderKeywords()}
  }},`添加${scopeLabel}`)
  card.appendChild(h('div',{cls:'row',style:'margin-bottom:10px'},ki,kb))

  const kws = data.keywords || []
  if (!kws.length) { card.appendChild(h('div',{cls:'empty'},'暂无关键词')); M.appendChild(card); return }
  const t=h('table'); t.innerHTML='<thead><tr><th>关键词</th><th>添加者</th><th>时间</th><th>操作</th></tr></thead>'
  const tb=h('tbody')
  kws.forEach(k=>{
    const tr=h('tr')
    const rb=h('button',{cls:'danger',onclick:async()=>{
      if (kwScope.type === 'category') {
        await api('/api/category/keyword/remove', { categoryId: kwScope.id, keyword: k.keyword })
      } else {
        await api('/api/keyword/remove', { groupId: k.group_id, keyword: k.keyword })
      }
      showOk(`已删除: ${k.keyword}`); renderKeywords()
    }},'删除')
    const td=h('td'); td.appendChild(rb)
    tr.innerHTML=`<td>${k.keyword}</td><td>${k.created_by||'—'}</td><td>${dt(k.created_at)}</td>`
    tr.appendChild(td); tb.appendChild(tr)
  })
  t.appendChild(tb); card.appendChild(t); M.appendChild(card)
}


// exScope: { type:'global'|'group'|'category', id:number }
let exScope = { type: 'global', id: 0 }
async function renderExempt() {
  if (me?.role !== 'superadmin' && exScope.type === 'global') {
    if (categories.length) exScope = { type: 'category', id: categories[0].id }
    else if (groups.length) exScope = { type: 'group', id: groups[0].group_id }
    else exScope = { type: 'none' }
  }
  if (exScope.type === 'none') {
    const M=document.getElementById('main'); M.innerHTML=''
    M.appendChild(h('div',{cls:'card',innerHTML:'<div class="empty">暂无已授权群组或组别，请联系超级管理员分配权限</div>'}))
    return
  }

  let data
  if (exScope.type === 'category') {
    data = await api('/api/category/exempt/list', { categoryId: exScope.id })
  } else {
    data = await api('/api/exempt/list', { groupId: exScope.type === 'global' ? 0 : exScope.id })
  }
  if (!data) return

  const M=document.getElementById('main'); M.innerHTML=''
  const card=h('div',{cls:'card'}); card.appendChild(h('h2',{},'豁免用户'))
  const sb=h('div',{cls:'sbar'}); sb.appendChild(h('label',{},'作用域：'))
  sb.appendChild(kwScopeSel(exScope, (scope) => { exScope = scope; renderExempt() }))
  card.appendChild(sb)

  const ui3=h('input',{type:'number',placeholder:'QQ号',style:'width:140px'})
  const scopeLabel = exScope.type==='global'?' (全局)' : exScope.type==='category'?` (组别)`:''
  const ab=h('button',{cls:'primary',onclick:async()=>{
    const uid=+ui3.value; if(!uid)return showErr('请输入QQ号')
    if (exScope.type === 'category') {
      await api('/api/category/exempt/add', { categoryId: exScope.id, userId: uid })
    } else {
      await api('/api/exempt/add', { groupId: exScope.type==='global'?0:exScope.id, userId: uid })
    }
    showOk(`已豁免: ${uid}`); ui3.value=''; renderExempt()
  }},`添加豁免${scopeLabel}`)
  card.appendChild(h('div',{cls:'row',style:'margin-bottom:10px'},ui3,ab))

  const users=data.users||[]
  if(!users.length){card.appendChild(h('div',{cls:'empty'},'暂无豁免用户'));M.appendChild(card);return}
  const t=h('table'); t.innerHTML='<thead><tr><th>QQ号</th><th>时间</th><th>操作</th></tr></thead>'
  const tb=h('tbody')
  users.forEach(u=>{
    const tr=h('tr')
    const rb=h('button',{cls:'danger',onclick:async()=>{
      if (exScope.type === 'category') {
        await api('/api/category/exempt/remove', { categoryId: u.category_id, userId: u.user_id })
      } else {
        await api('/api/exempt/remove', { groupId: u.group_id, userId: u.user_id })
      }
      showOk(`已取消: ${u.user_id}`); renderExempt()
    }},'取消')
    const td=h('td');td.appendChild(rb)
    tr.innerHTML=`<td>${u.user_id}</td><td>${dt(u.created_at)}</td>`; tr.appendChild(td); tb.appendChild(tr)
  })
  t.appendChild(tb); card.appendChild(t); M.appendChild(card)
}

function openUsernameModal(oldUsername, isOwn) {
  const bg = h('div', { cls: 'modal-bg' })
  const modal = h('div', { cls: 'modal' })
  modal.appendChild(h('h3', {}, `修改用户名 — ${oldUsername}`))
  const nu = h('input', { type: 'text', placeholder: '新用户名（至少2位）', style: 'width:100%', value: oldUsername })
  modal.appendChild(nu)
  let pwInput = null
  if (isOwn) {
    pwInput = h('input', { type: 'password', placeholder: '当前密码确认', style: 'width:100%;margin-top:8px' })
    modal.appendChild(pwInput)
  }
  const errEl = h('div', { style: 'color:var(--red);font-size:12px;min-height:16px' })
  const row2 = h('div', { cls: 'row' })
  row2.append(
    h('button', { cls: 'primary', onclick: async () => {
      const newUsername = nu.value.trim()
      if (!newUsername || newUsername.length < 2) { errEl.textContent = '用户名至少 2 位'; return }

let imgScope = 0  // 0 = global, or group_id

async function renderImageConfig() {
  const isSA = me?.role === 'superadmin'
  const M = document.getElementById('main'); M.innerHTML = ''

  // ── scope selector ──
  const topCard = h('div',{cls:'card'})
  topCard.appendChild(h('h2',{},'图片处理'))
  const sb = h('div',{cls:'sbar'}); sb.appendChild(h('label',{},'作用范围：'))
  const scopeSel = h('select',{onchange:async(e)=>{ imgScope=+e.target.value; await renderImageConfig() }})
  const g0 = h('option',{value:'0'},'全局默认'); if(imgScope===0) g0.selected=true; scopeSel.appendChild(g0)
  for(const g of groups){
    const o=h('option',{value:String(g.group_id)},`群 ${g.group_id}`); if(g.group_id===imgScope) o.selected=true; scopeSel.appendChild(o)
  }
  sb.appendChild(scopeSel); topCard.appendChild(sb)
  if(imgScope!==0) topCard.appendChild(h('p',{style:'color:var(--dim);font-size:12px;margin-top:6px'},'⚠ 单群设置仅覆盖开关，API URL / Key 始终使用全局配置'))
  M.appendChild(topCard)

  const data = await api('/api/image-rules/get', { groupId: imgScope }); if(!data) return
  const r = data.rules || {}

  // ── helper: feature card ──
  function featureCard(title, enableKey, enableLabel, fields, extraNote) {
    const card = h('div',{cls:'card'})
    card.appendChild(h('h2',{},title))
    if(extraNote) card.appendChild(h('p',{style:'color:var(--dim);font-size:12px;margin-bottom:10px'},extraNote))

    const enabled = h('input',{type:'checkbox',id:`chk_${enableKey}`}); enabled.checked = !!r[enableKey]
    const lbl = h('label',{style:'display:flex;align-items:center;gap:8px;margin-bottom:12px'})
    lbl.appendChild(enabled); lbl.appendChild(document.createTextNode(enableLabel)); card.appendChild(lbl)

    const fieldEls = {}
    for(const [key, label, placeholder, type] of fields) {
      const row = h('div',{style:'display:grid;grid-template-columns:140px 1fr;align-items:center;gap:8px;margin-bottom:8px'})
      row.appendChild(h('label',{style:'font-size:12px;color:var(--dim)'},label))
      const inp = type==='checkbox'
        ? (() => { const c=h('input',{type:'checkbox'}); c.checked=!!r[key]; return c })()
        : h('input',{type:type||'text',placeholder:placeholder||'',value:r[key]||'',style:'flex:1'})
      if(type==='password') inp.type='password'
      row.appendChild(inp); card.appendChild(row); fieldEls[key]=inp
    }

    if(isSA){
      const btn=h('button',{cls:'primary',style:'margin-top:8px',onclick:async()=>{
        const body={groupId:imgScope,[enableKey]:enabled.checked?1:0}
        for(const [key,,,,noGlobal] of fields){
          if(imgScope===0||!noGlobal) body[key]=fieldEls[key].type==='checkbox'?(fieldEls[key].checked?1:0):fieldEls[key].value
        }
        await api('/api/image-rules/set',body); showOk(`已保存: ${title}`)
      }},'保存')
      card.appendChild(btn)
    }
    return card
  }

  // QR 码
  M.appendChild(featureCard('二维码检测', 'qr_enabled', '启用二维码识别（jsqr，无需 API）', [
    ['qr_block_all', '拦截所有二维码', '', 'checkbox'],
  ], '开启后扫描图片中的二维码内容，命中关键词时撤回（或启用"拦截所有"直接撤回任意二维码）。'))

  // OCR
  M.appendChild(featureCard('OCR 文字识别', 'ocr_enabled', '启用 OCR 文字识别', [
    ['ocr_url', 'API URL', 'POST { url } → { text }', 'text', true],
    ['ocr_key', 'API Key', '（可选）', 'password', true],
  ], '识别图片中文字并与关键词匹配。API 格式: POST {"url":"..."} → {"text":"..."}'))

  // NSFW
  M.appendChild(featureCard('涩图检测 (NSFW)', 'nsfw_enabled', '启用涩图检测', [
    ['nsfw_url',       'API URL',   'POST { url } → { score: 0~1 }', 'text', true],
    ['nsfw_key',       'API Key',   '（可选）', 'password', true],
    ['nsfw_threshold', '置信阈值',  '0.0 ~ 1.0（默认 0.7）', 'number'],
  ], 'API 格式: POST {"url":"..."} → {"score":0.85} 或 {"nsfw":true}'))

  // LLM
  M.appendChild(featureCard('LLM 图片分析', 'llm_enabled', '启用 LLM 视觉分析', [
    ['llm_url',    'API URL',    'OpenAI-compatible /v1/chat/completions', 'text', true],
    ['llm_key',    'API Key',    'Bearer token', 'password', true],
    ['llm_model',  '模型名',     'gpt-4o / qwen-vl-plus / ...', 'text', true],
    ['llm_prompt', '审核提示词', '（留空使用默认）', 'text', true],
  ], '回复约定: 无违规→ "OK"，有违规→ "VIOLATION: 原因"。使用任意 OpenAI 兼容视觉 API。'))
}

// ── Navigation ─────────────────────────────────────────────────────────────
const pageMap = { dashboard:renderDashboard, groups:renderGroups, keywords:renderKeywords, exempt:renderExempt, violations:renderViolations, users:renderUsers, categories:renderCategories, imageconfig:renderImageConfig }
let curPage = 'dashboard'

async function goTo(p) {
  curPage = p
  document.querySelectorAll('nav button[data-p]').forEach(b=>b.classList.toggle('active',b.dataset.p===p))
  document.getElementById('main').innerHTML='<div class="empty">加载中...</div>'
  try { await pageMap[p]() } catch(e) { showErr(e.message) }
}

document.getElementById('main').addEventListener('click',()=>{})
document.querySelector('nav').addEventListener('click',(e)=>{
  const b=e.target.closest('button[data-p]'); if(b) goTo(b.dataset.p)
})

// ── Password change modal ──────────────────────────────────────────────────
document.getElementById('pwbtn').onclick = () => {
  const bg = h('div', { cls: 'modal-bg' })
  const modal = h('div', { cls: 'modal' })
  modal.appendChild(h('h3', {}, '修改密码'))
  const op = h('input', { type: 'password', placeholder: '当前密码', style: 'width:100%' })
  const np = h('input', { type: 'password', placeholder: '新密码（至少6位）', style: 'width:100%' })
  const cp = h('input', { type: 'password', placeholder: '确认新密码', style: 'width:100%' })
  const err2 = h('div', { style: 'color:var(--red);font-size:12px;min-height:16px' })
  const row2 = h('div', { cls: 'row' })
  const ok2 = h('button', { cls: 'primary', onclick: async () => {
    if (np.value !== cp.value) { err2.textContent = '两次密码不一致'; return }
    const r = await api('/api/user/password', { oldPassword: op.value, newPassword: np.value })
    if (r !== null) { showOk('密码已修改'); document.body.removeChild(bg); setDefaultWarn(false) }
    else err2.textContent = '修改失败，请检查当前密码'
  }}, '确认修改')
  const cancel = h('button', { onclick: () => document.body.removeChild(bg) }, '取消')
  row2.append(ok2, cancel)
  modal.append(op, np, cp, err2, row2)
  bg.appendChild(modal); document.body.appendChild(bg)
  op.focus()
}

// ── Login flow ─────────────────────────────────────────────────────────────
document.getElementById('lbtn').onclick = async () => {
  const u = document.getElementById('lu').value.trim()
  const p = document.getElementById('lp').value
  const el = document.getElementById('lerr')
  el.textContent = '登录中...'
  try {
    const r = await fetch('/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin', body: JSON.stringify({ username: u, password: p })
    })
    const data = await r.json()
    if (!data.ok) { el.textContent = data.error || '登录失败'; return }
    me = data.data
    if (document.getElementById('remem').checked) localStorage.setItem('gm_user', u)
    el.textContent = ''
    document.getElementById('login').style.display = 'none'
    document.getElementById('app').style.display   = 'flex'
    document.getElementById('uname').textContent   = me.username
    setDefaultWarn(!!me.isDefaultPassword)
    connectSSE()
    await refreshMeta()
    await goTo('dashboard')
  } catch(e) { el.textContent = e.message }
}

document.getElementById('lu').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('lp').focus() }
document.getElementById('lp').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('lbtn').click() }

document.getElementById('lout').onclick = async () => {
  await fetch('/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: '{}' })
  if (es) { es.close(); es = null }
  me = null
  document.getElementById('app').style.display   = 'none'
  document.getElementById('login').style.display = 'flex'
  setConn(false)
}

document.getElementById('clrlog').onclick = () => { document.getElementById('logbody').innerHTML='' }

// ── Check existing session ─────────────────────────────────────────────────
;(async () => {
  const u = localStorage.getItem('gm_user'); if (u) document.getElementById('lu').value = u
  try {
    const r = await fetch('/me', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: '{}' })
    const data = await r.json()
    if (data.ok) {
      me = data.data
      document.getElementById('login').style.display = 'none'
      document.getElementById('app').style.display   = 'flex'
      document.getElementById('uname').textContent   = me.username
      setDefaultWarn(!!me.isDefaultPassword)
      connectSSE()
      await refreshMeta()
      await goTo('dashboard')
    }
  } catch {}
})()
</script>
